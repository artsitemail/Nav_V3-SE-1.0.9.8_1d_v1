name: Compilar Firmware Ender 3 V3 SE

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite compilar manualmente clicando num botão no GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar o PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio

    - name: Compilar o Firmware
      run: |
        # O ambiente padrão para a board da Ender 3 V3 SE é o STM32F401RC_creality
        # Caso o teu fork use outro nome no platformio.ini, altera o comando abaixo.
        pio run -e STM32F103RET6_creality

    - name: Guardar o Ficheiro Compilado (.bin)
      uses: actions/upload-artifact@v4
      with:
        name: Firmware-Ender3V3SE
        path: .pio/build/STM32F103RET6_creality/*.bin
